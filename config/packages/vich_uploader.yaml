vich_uploader:
    db_driver: orm
    mappings:
        # ----------------------------------------------------------------------
        # 1. HUÉSPEDES (Usa el HuespedNamer específico)
        # ----------------------------------------------------------------------
        huesped_docs:
            # URL pública (ej: /carga/huespedes/docs)
            uri_prefix: '%pms.path.huesped_docs%'
            # Ruta física en disco
            upload_destination: '%app.public_dir%%pms.path.huesped_docs%'

            namer: App\Pms\Naming\HuespedNamer # ✅ Específico (nombres legibles)

            # Vital: false porque tus AssetListeners ya inyectan la URL
            inject_on_load: false

            delete_on_update: true
            delete_on_remove: true

        huesped_firmas:
            uri_prefix: '%pms.path.huesped_firmas%'
            upload_destination: '%app.public_dir%%pms.path.huesped_firmas%'

            namer: App\Pms\Naming\HuespedNamer # ✅ Específico

            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true

        # ----------------------------------------------------------------------
        # 2. GALERÍA (Usa el MediaTokenNamer universal)
        # ----------------------------------------------------------------------
        guia_images:
            uri_prefix: '%pms.path.galeria_images%'

            # 🔴 CORREGIDO: Tenías un error de tipeo "...dir%/p%pms..." (la 'p' extra)
            upload_destination: '%app.public_dir%%pms.path.galeria_images%'

            # ✅ UNIVERSAL: Usa el token del MediaTrait (TOKEN_nombre.webp)
            namer: App\Panel\Naming\MediaTokenNamer

            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true

        # ----------------------------------------------------------------------
        # 2. GALERÍA (Usa el MediaTokenNamer universal)
        # ----------------------------------------------------------------------
        unidad_images:
            uri_prefix: '%pms.path.unidad_images%'

            # 🔴 CORREGIDO: Tenías un error de tipeo "...dir%/p%pms..." (la 'p' extra)
            upload_destination: '%app.public_dir%%pms.path.unidad_images%'

            # ✅ UNIVERSAL: Usa el token del MediaTrait (TOKEN_nombre.webp)
            namer: App\Panel\Naming\MediaTokenNamer

            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true

        message_attachments:
            uri_prefix: '%message.path.message_attachments%'
            upload_destination: '%app.public_dir%%message.path.message_attachments%'
            namer: App\Panel\Naming\MediaTokenNamer

            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true

        travel_segmento_imagenes:
            uri_prefix: '%travel.path.segmento_imagenes%'
            upload_destination: '%app.public_dir%%travel.path.segmento_imagenes%'
            namer: App\Panel\Naming\MediaTokenNamer
            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true

        cotizacion_file_documentos:
            # Puedes usar un parámetro en services.yaml o escribir la ruta directamente
            uri_prefix: '%cotizacion.path.file_documentos%'
            upload_destination: '%app.public_dir%%cotizacion.path.file_documentos%'

            # Universal: Usa el token del MediaTrait (TOKEN_nombre.ext)
            namer: App\Panel\Naming\MediaTokenNamer

            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true

        travel_proveedor_galeria:
            uri_prefix: '%travel.path.proveedor_galeria%'
            upload_destination: '%app.public_dir%%travel.path.proveedor_galeria%'
            namer: App\Panel\Naming\MediaTokenNamer
            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true