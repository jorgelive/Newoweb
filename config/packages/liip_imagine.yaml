liip_imagine:
    # Usamos imagick (asegúrate de que tu Docker lo tenga, si no usa "gd")
    driver: "imagick"

    resolvers:
        default:
            web_path:
                web_root: "%kernel.project_dir%/public"
                cache_prefix: "media/cache"

    filter_sets:
        # --- FILTRO 1: COMPRESIÓN INICIAL ---
        pms_compress_initial:
            quality: 80
            format: webp  # ✅ CORRECTO: Va aquí afuera, no dentro de 'filters'
            filters:
                downscale: { max: [1600, 1600] }
                strip: ~

        # --- FILTRO 2: THUMBNAIL ADMIN ---
        pms_thumb_admin:
            quality: 75
            format: webp  # ✅ CORRECTO: Define el formato de salida del set
            filters:
                thumbnail: { size: [150, 150], mode: outbound, allow_upscale: true }
                # ❌ ELIMINA: format: { name: webp } de aquí adentro

        # 🔥 FILTRO 3: COMPRESIÓN LEGACY (Para Beds24 / Canales externos) ---
        pms_compress_legacy:
            quality: 85 # Un poco más alto porque el JPEG pierde más detalle que WebP
            format: jpeg
            filters:
                downscale: { max: [ 1600, 1600 ] }
                strip: ~

        # --- FILTRO 4: THUMBNAIL TRAVEL (selectores y grillas del editor) ---
        travel_thumb_admin:
            quality: 75
            format: webp
            filters:
                thumbnail: { size: [220, 124], mode: outbound, allow_upscale: true } # 16:9 para cards
                strip: ~

        # --- FILTRO 5: VISTA CLIENTE (pax: cards y visor de fotos) ---
        # Limita la altura a 900px conservando proporción; nunca upscalea.
        travel_cliente:
            quality: 80
            format: webp
            filters:
                downscale: { max: [1600, 900] }
                strip: ~