# config/services/services_exchange.yaml
services:

    _defaults:
        autowire: true
        autoconfigure: true

    App\Exchange\:
        resource: '../../src/Exchange/'
        exclude:
            - '../src/Exchange/Dto/'
            - '../src/Exchange/Entity/'

    App\Exchange\Controller\:
        resource: '../../src/Exchange/Controller/'
        autowire: true
        autoconfigure: true
        tags:
            - 'controller.service_arguments'
